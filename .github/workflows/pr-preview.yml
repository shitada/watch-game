name: PR Preview Deploy

on:
  push:
    branches: ['improve/**']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit & Integration Tests
        run: npm test

      - name: Determine preview path
        id: preview
        run: |
          # Normalize branch name for use as directory name (replace / with -)
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SAFE_BRANCH="$(echo "${BRANCH}" | sed 's|/|-|g')"
          echo "branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "url=https://shitada.github.io/watch-game/preview/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"

      - name: Build with preview base path
        run: npx vite build --base "/watch-game/preview/${{ steps.preview.outputs.branch }}/"
        env:
          NODE_ENV: production

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/${{ steps.preview.outputs.branch }}
          keep_files: true

      # Checkout the full gh-pages content (main site + all previews)
      - name: Checkout gh-pages for deploy
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-content

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages-content

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const marker = '<!-- preview-url -->';
            const body = `${marker}\n🌐 **プレビュー**: ${url}\n\niPad Safari で実機テストできます。`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
