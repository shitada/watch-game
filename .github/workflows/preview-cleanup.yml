name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]
  delete:
    branches: ['improve/**']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Determine preview directory
        id: preview
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
          else
            BRANCH="${{ github.event.ref }}"
          fi
          SAFE_BRANCH="$(echo "${BRANCH}" | sed 's|/|-|g')"
          echo "dir=preview/${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Remove preview directory
        id: cleanup
        run: |
          DIR="${{ steps.preview.outputs.dir }}"
          if [ -d "${DIR}" ]; then
            rm -rf "${DIR}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: remove preview for ${{ steps.preview.outputs.branch }}" || echo "Nothing to commit"
            git push origin gh-pages
            echo "cleaned=true" >> "$GITHUB_OUTPUT"
            echo "✅ Removed ${DIR}"
          else
            echo "cleaned=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ ${DIR} does not exist, nothing to clean up"
          fi

      - uses: actions/upload-pages-artifact@v3
        if: steps.cleanup.outputs.cleaned == 'true'
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: steps.cleanup.outputs.cleaned == 'true'
